# Stock Recommendation Framework / 量化推荐策略
# Full-chain decision framework: market regime → sector → stock selection → entry → risk control.

name: stock_recommendation
display_name: 量化推荐策略
aliases: [量化推荐, 推荐框架, 个股推荐]
description: 基于量化回测的股票推荐决策框架，覆盖量价关系、进出场规则、风险控制
category: framework
default_priority: 15
market_regimes: [trending_up, sideways, sector_hot, volatile]
core_rules: [1, 2, 3, 4, 5, 6, 7]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote

instructions: |
  **量化推荐策略（Stock Recommendation Framework）**

  数据使用约定（避免重复抓取）：
  - **预注入数据**：`news_items` 已在批量评分前从数据库按股票加载，优先基于该上下文做舆情判断，不要在每一步重复搜索新闻。
  - **预注入上下文**：板块强弱/热门方向由扫描器与工具链上下文提供，作为板块轮动判断基础，无需在每一步重复请求板块排行数据。
  - **Agent 主动获取**：仅对当前分析必须的实时/行情细节使用 `required_tools`（`get_daily_history`、`analyze_trend`、`get_realtime_quote`）。

  九步决策链：

  1. **市场 MA5 方向判断**：
     - 使用 `get_daily_history` 获取大盘指数近期数据。
     - MA5 向上 → 多头环境（期望收益 +3.43%）；MA5 走平/向下 → 震荡环境（期望收益 -3.03%）。
     - 市场区域直接决定仓位上限与选股严格度。

  2. **板块识别与轮动**：
     - 优先使用已提供的板块强弱与轮动上下文识别主线方向。
     - 使用 `analyze_trend` 验证候选标的/板块内个股趋势强弱与延续性。
     - 优先选择板块内有明确催化剂的方向。

  3. **延续性判断**：
     - 板块连续 2 日以上领涨视为有效趋势；单日脉冲需降低仓位。
     - 延续性以价格重心抬升为准；放量突破后需观察是否缩量回踩确认，放量不回踩视为见顶风险。

  4. **选股规则**：
     - 使用 `get_realtime_quote` 获取实时行情。
     - 催化剂分级：S 级催化剂胜率 95%，A 级催化剂胜率仅 16%，严格区分。
     - 传统"好股票"（基本面优质但无催化剂）历史胜率仅 12-17%，不可作为买入依据。

  5. **入场条件**：
     - 缩量回踩为正期望入场信号（量比 ≤ 0.8 且价格贴近 MA5/MA10）。
     - 放量见顶为风险信号（量比 > 2.0 伴随长上影线需警惕）。
     - 逆势 MA20 信号：价格低于 MA20 超过 2% 时，反弹概率 75.8%，可作为左侧参考。

  6. **风控参数**：
     - 止盈：+10%（基于买入价）。
     - 止损：-7%（基于买入价，硬性执行）。
     - 最大持有：10 个交易日，超期无论盈亏强制离场。

  7. **量价核心规则**：
     - 缩量回踩（volume_ratio ≤ 0.8 且 price 贴近均线）→ 正期望，加分。
     - 放量见顶（volume_ratio > 2.0）→ 风险信号，减分。
     - 中度放量（1.0-2.0x）→ 中性，不额外调整。

  8. **关键陷阱（必须规避）**：
     - 资金流数据不可靠：主力资金净流入/流出指标噪声极大，不可作为核心决策依据。
     - 高开 > 7% 陷阱：开盘涨幅超过 7% 的个股追入胜率极低，属于典型诱多。
     - "好股票"误区：仅凭基本面优质买入，历史胜率 12-17%，必须叠加催化剂。

  9. **评分与输出**：
     - 多头市场基线偏移 +3.43%，震荡市场基线偏移 -3.03%。
     - 在 `buy_reason` 中注明触发的具体规则与催化剂等级。
     - 风险详情须包含 `max_hold_days: 10`。
